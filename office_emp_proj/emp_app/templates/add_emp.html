<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h1>Add An Employee!</h1>
    <hr>
    <form action="/add_emp" method="post">
        {% csrf_token %}

        <label for="first_name">First Name</label><br>
        <input type="text" id="first_name" name="first_name" required><br>

        <label for="last_name">Last Name</label><br>
        <input type="text" id="last_name" name="last_name" required><br>

        <label for="salary">Salary</label><br>
        <input type="number" id="salary" name="salary" required><br>

        <label for="department">Department</label><br>
        <input type="text" id="department" name="department" placeholder="e.g. IT" required><br>

        <label for="role">Role</label><br>
        <input type="text" id="role" name="role" placeholder="e.g. Developer" required><br>

        <label for="bonus">Bonus</label><br>
        <input type="number" id="bonus" name="bonus" required><br>

        <label for="phone">Phone</label><br>
        <input type="text" id="phone" name="phone" required><br>

        <hr>
        <button type="submit" class="btn btn-primary">Add Employee</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
