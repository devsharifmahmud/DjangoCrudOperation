<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Add Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h1>Add An Employee!</h1>
    <hr>
    <form action="/add_emp" method="POST">
        {% csrf_token %}
        <label for="first_name" >First Name</label><br>
        <input type="text" id="first_name" value="{{first_name}}"><br>
        <label for="last_name" >Last Name</label><br>
        <input type="text" id="last_name" value="{{last_name}}"><br>
        <label for="salary" >Salary</label><br>
        <input type="number" id="salary" value="{{salary}}"><br>
        <label for="department" >Department</label><br>
        <input type="number" id="department" value="{{department}}"><br>
        <label for="role" >Role</label><br>
        <input type="number" id="role" value="{{role}}"><br>
        <label for="bonus" >Bonus</label><br>
        <input type="number" id="bonus" value="{{bonus}}"><br>
        <hr>
        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
